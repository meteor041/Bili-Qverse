  // ── TrendCanvas ──
  function TrendCanvas({ data, height = 80 }) {
    const ref = useRef(null);
    useEffect(() => {
      const cv = ref.current;if (!cv) return;
      const ctx = cv.getContext('2d'),W = cv.width,H = cv.height;
      ctx.clearRect(0, 0, W, H);
      const max = Math.max(...data.map((d) => d.v || d));
      const pts = data.map((d, i) => ({ x: i / (data.length - 1) * (W - 20) + 10, y: H - 20 - (d.v || d) / max * (H - 40) }));
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, 'rgba(0,161,214,.3)');g.addColorStop(1, 'rgba(0,161,214,0)');
      ctx.beginPath();ctx.moveTo(pts[0].x, H);
      pts.forEach((p) => ctx.lineTo(p.x, p.y));
      ctx.lineTo(pts[pts.length - 1].x, H);ctx.closePath();
      ctx.fillStyle = g;ctx.fill();
      ctx.beginPath();pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
      ctx.strokeStyle = '#00A1D6';ctx.lineWidth = 2;ctx.stroke();
      pts.forEach((p) => {ctx.beginPath();ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);ctx.fillStyle = '#00e5ff';ctx.fill();});
    }, [data]);
    return <canvas ref={ref} width={280} height={height} style={{ width: '100%', height }} />;
  }

  function AnimatedCard({ children, index }) {
    const ref = useRef(null);

    useEffect(() => {
      const obs = new IntersectionObserver(([e]) => {if (e.isIntersecting) {setVis(true);obs.disconnect();}}, { threshold: .1 });
      if (ref.current) obs.observe(ref.current);
      return () => obs.disconnect();
    }, []);
    return (
      <div ref={ref} style={{ opacity: vis ? 1 : 0, transform: vis ? 'translateY(0)' : 'translateY(40px)', transition: `opacity .5s ease ${index * .08}s,transform .5s ease ${index * .08}s` }}>

    </div>);

    const [time, setTime] = useState('week');

    // Simulate different time windows via score modifiers

      let list = [...vids];
      // Time filter: day=recent uploads, week=all, month=all+boost older, all=all
      if (timeKey === 'day') {
        list = list.filter((v) => v.uploadTime.includes('小时') || v.uploadTime.includes('昨天'));
        if (list.length < 4) list = [...vids].slice(0, 8);
      } else if (timeKey === 'month') {
        // boost mid-range videos slightly
        list = list.map((v) => ({ ...v, _score: v.questionIndex * (0.85 + Math.sin(v.id) * 0.15) }));
      } else if (timeKey === 'all') {
        list = list.map((v) => ({ ...v, _score: v.questionIndex * (0.9 + Math.cos(v.id * 0.7) * 0.1) }));
      } else {
        list = list.map((v) => ({ ...v, _score: v.questionIndex }));
      }
      // Type sort
      if (typeKey === '综合') return list.sort((a, b) => (b._score || b.questionIndex) - (a._score || a.questionIndex));
      if (typeKey === '问号') return list.sort((a, b) => parseFloat(b.danmaku) - parseFloat(a.danmaku));

  // ── Waveform ──
  function Waveform({ tl, peaks, color = '#00A1D6' }) {
    const ref = useRef(null);
    useEffect(() => {
      const cv = ref.current;if (!cv) return;
      const ctx = cv.getContext('2d'),W = cv.width,H = cv.height;
      ctx.clearRect(0, 0, W, H);
      const max = Math.max(...tl.map((d) => d.v));
      const bw = W / tl.length;
      tl.forEach((d, i) => {
        const h = d.v / max * (H - 20),x = i * bw,p = d.v / max;
        if (p > .7) {ctx.shadowColor = 'rgba(255,71,87,.6)';ctx.shadowBlur = 12;} else {ctx.shadowColor = 'transparent';ctx.shadowBlur = 0;}
        const g = ctx.createLinearGradient(0, H - h - 10, 0, H - 10);
        g.addColorStop(0, p > .7 ? '#ff4757' : p > .4 ? '#ff6b35' : color);
        g.addColorStop(1, p > .7 ? 'rgba(255,71,87,.3)' : p > .4 ? 'rgba(255,107,53,.3)' : `${color}44`);
        ctx.fillStyle = g;ctx.beginPath();ctx.roundRect(x + 1, H - h - 10, bw - 2, h, 2);ctx.fill();
      });
    }, [tl, color]);
    const fmt = (s) => `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, '0')}`;
    return (
      <div>
      <canvas ref={ref} width={800} height={100} style={{ width: '100%', height: 100 }} />
      <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 4, fontSize: 10, color: 'var(--muted)' }}>
        {[0, .25, .5, .75, 1].map((p) => <span key={p}>{fmt(Math.round(p * (tl[tl.length - 1]?.t || 0)))}</span>)}
      </div>
      {peaks &&
        <div style={{ marginTop: 16 }}>
          <div style={{ fontSize: 12, color: 'var(--muted)', marginBottom: 8 }}>💥 迷惑瞬间</div>
          {peaks.map((m, i) =>
          <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 10, background: 'var(--card2)', borderRadius: 10, padding: '8px 12px', border: '1px solid var(--border)', marginBottom: 6, cursor: 'pointer' }}>
              <div style={{ background: 'rgba(0,161,214,.15)', border: '1px solid rgba(0,161,214,.3)', borderRadius: 8, padding: '3px 8px', fontSize: 11, fontWeight: 700, color: 'var(--blue)', flexShrink: 0 }}>{m.time}</div>
              <div style={{ fontSize: 14, fontWeight: 900, color: 'var(--qc)', letterSpacing: 2 }}>{m.label}</div>
              <div style={{ marginLeft: 'auto', fontSize: 11, color: 'var(--muted)' }}>密度 <span style={{ color: 'var(--red)', fontWeight: 700 }}>{m.count}</span></div>
              <span style={{ fontSize: 11, color: 'var(--blue)' }}>→ 跳转</span>
            </div>
          )}
        </div>
        }
    </div>);

  // ── ④ Confusion Calculator ──
  function ConfusionCalc() {
    const [input, setInput] = useState('');
    const [stage, setStage] = useState('idle'); // idle | scanning | result
    const [score, setScore] = useState(0);
    const [logs, setLogs] = useState([]);
    const [qExplosion, setQExplosion] = useState(false);

    const scanMessages = [
    '正在分析标题语义…', '检测问号密度…', '扫描弹幕特征词…', '计算迷惑系数…', '比对历史数据库…', '运行疑问指数模型…', '生成最终结果…'];


    function calculate() {
      if (!input.trim()) return;
      setStage('scanning');setLogs([]);setScore(0);
      let i = 0;
      const iv = setInterval(() => {
        if (i < scanMessages.length) {setLogs((l) => [...l, scanMessages[i]]);i++;} else
        {
          clearInterval(iv);
          // "AI" score based on ? count + length + keywords
          const qCount = (input.match(/[？?]/g) || []).length;
          const keywords = ['离谱', '不懂', '看不懂', '什么', '怎么', '为什么', '神', '诶', '诶诶', '啊', '吗', '吧'].filter((k) => input.includes(k)).length;
          const raw = Math.min(100, Math.round(20 + qCount * 12 + keywords * 8 + (input.length > 10 ? 15 : 0) + Math.random() * 20));
          setScore(raw);setStage('result');
          if (raw >= 80) {setQExplosion(true);setTimeout(() => setQExplosion(false), 1000);}
        }
      }, 280);
    }

    const getLabel = (s) => s >= 90 ? '🔥 极度迷惑' : s >= 75 ? '😵 非常迷惑' : s >= 55 ? '🤔 中度迷惑' : s >= 35 ? '🙄 轻度迷惑' : '😐 普通视频';
    const getColor = (s) => s >= 90 ? 'var(--red)' : s >= 75 ? 'var(--orange)' : s >= 55 ? 'var(--gold)' : s >= 35 ? 'var(--blue)' : 'var(--muted)';

    return (
      <div style={{ maxWidth: 700, margin: '0 auto', padding: '80px 24px 60px' }}>
      <div style={{ textAlign: 'center', marginBottom: 40 }}>
        <div style={{ fontSize: 40, marginBottom: 12, animation: 'floatY 3s ease-in-out infinite' }}>🧮</div>
        <h2 style={{ fontSize: 28, fontWeight: 900, marginBottom: 8 }}>迷惑指数计算器</h2>
        <p style={{ color: 'var(--muted)', fontSize: 14 }}>输入视频标题，AI 帮你计算有多离谱</p>
      </div>
      <div style={{ background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 20, padding: 28, marginBottom: 24 }}>
        <div style={{ marginBottom: 16 }}>
          <textarea
              value={input} onChange={(e) => setInput(e.target.value)}
              placeholder="输入视频标题，例如：这个人到底在干嘛？？？"
              style={{ width: '100%', background: 'var(--card2)', border: '1px solid var(--border)', borderRadius: 12, padding: '14px 16px', color: 'var(--txt)', fontSize: 15, fontFamily: 'inherit', resize: 'none', height: 90, outline: 'none', lineHeight: 1.6 }} />
            
        </div>
        <button onClick={calculate} disabled={stage === 'scanning' || !input.trim()} style={{ width: '100%', background: 'linear-gradient(135deg,var(--blue),var(--blue-d))', border: 'none', borderRadius: 14, padding: '14px', color: 'white', fontSize: 15, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit', opacity: stage === 'scanning' || !input.trim() ? .5 : 1, boxShadow: '0 6px 20px rgba(0,161,214,.3)' }}>
          {stage === 'scanning' ? '分析中…' : '🧮 开始计算'}
        </button>
      </div>

      {stage === 'scanning' &&
        <div style={{ background: 'var(--card)', border: '1px solid rgba(0,229,255,.2)', borderRadius: 16, padding: 20 }}>
          <div style={{ fontSize: 12, color: 'var(--qc)', marginBottom: 12, display: 'flex', alignItems: 'center', gap: 8 }}>
            <div style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--qc)', animation: 'pulse .8s infinite' }}></div>
            AI 分析中
          </div>
          {logs.map((l, i) =>
          <div key={i} style={{ fontSize: 12, color: 'var(--txt2)', padding: '4px 0', borderBottom: '1px solid var(--border)', animation: 'fadeInUp .3s ease both', animationDelay: `${i * .05}s` }}>
              <span style={{ color: 'var(--qc)', marginRight: 8 }}>›</span>{l}
            </div>
          )}
          {/* Fake scan line */}
          <div style={{ position: 'relative', height: 3, background: 'rgba(0,229,255,.1)', borderRadius: 2, overflow: 'hidden', marginTop: 12 }}>
            <div style={{ position: 'absolute', top: 0, bottom: 0, width: '30%', background: 'linear-gradient(90deg,transparent,var(--qc),transparent)', animation: 'shimmer 1s linear infinite' }}></div>
          </div>
        </div>
        }

      {stage === 'result' &&
        <div style={{ background: 'var(--card)', border: `1px solid ${getColor(score)}44`, borderRadius: 20, padding: 28, textAlign: 'center', animation: 'fadeInUp .5s ease', position: 'relative', overflow: 'hidden' }}>
          {/* q explosion */}
          {qExplosion && [...Array(8)].map((_, i) =>
          <div key={i} style={{ position: 'absolute', fontSize: 24, fontWeight: 900, color: 'var(--qc)', animation: 'qExplode .8s ease forwards', left: `${10 + i * 10}%`, top: `${20 + Math.sin(i) * 30}%`, animationDelay: `${i * .05}s`, opacity: .8 }}>？</div>
          )}
          <div style={{ fontSize: 72, fontWeight: 900, color: getColor(score), textShadow: `0 0 30px ${getColor(score)}88`, animation: 'floatY 2s ease-in-out infinite', lineHeight: 1, marginBottom: 8 }}>{score}</div>
          <div style={{ fontSize: 18, fontWeight: 700, color: getColor(score), marginBottom: 12 }}>{getLabel(score)}</div>
          <QBar value={score} />
          <div style={{ marginTop: 16, fontSize: 13, color: 'var(--txt2)', lineHeight: 1.7 }}>「{input}」<br />的疑问指数为 <span style={{ color: getColor(score), fontWeight: 700 }}>{score}/100</span></div>
          <div style={{ display: 'flex', justifyContent: 'center', gap: 12, marginTop: 20 }}>
            <button onClick={() => {setStage('idle');setInput('');}} style={{ background: 'transparent', border: '1px solid var(--border)', borderRadius: 20, padding: '8px 18px', color: 'var(--muted)', fontSize: 13, cursor: 'pointer', fontFamily: 'inherit' }}>再算一次</button>
          </div>
        </div>
        }
    </div>);

  }

    const vids = allVideos();
    const heroVid = vids[parseInt(tweaks.heroIdx) || 0] || vids[0];

    const goDetail = useCallback((v) => {setSelVid(v);setPage('detail');window.scrollTo({ top: 0, behavior: 'smooth' });}, []);
    const goHome = useCallback(() => {setPage('home');window.scrollTo({ top: 0 });}, []);
    const openShare = useCallback((v) => setShareVid(v), []);

    const toggleCompare = useCallback((vid) => {
      setCompareList((prev) => {
        if (prev.includes(vid.id)) return prev.filter((id) => id !== vid.id);
        if (prev.length >= 2) return [prev[1], vid.id];
        return [...prev, vid.id];
      });
    }, []);

    const handleNavPage = useCallback((p) => {
      setPage(p);
      if (p === 'compare') setCompareMode(true);else
      setCompareMode(false);
      window.scrollTo({ top: 0 });
    }, []);

    return (
      <div style={{ minHeight: '100vh', position: 'relative' }}>
      <DanmakuEngine />
      {tweaks.showDanmaku && <FloatingQs />}
      <Navbar page={page} setPage={handleNavPage} />
      <GlobalCounter />
      <main style={{ position: 'relative', zIndex: 1, paddingTop: 92 }}>
        {page === 'home' && <>
          <Hero vid={heroVid} onSelect={goDetail} onShare={openShare} />
          <Leaderboard onSelect={goDetail} compareMode={false} onCompare={() => {}} compareList={[]} />
          <div style={{ height: 80 }}></div>
        </>}
        {page === 'detail' && <DetailPage vid={selVid || vids[0]} onBack={() => setPage('home')} onShare={openShare} />}
        {page === 'hall' && <HallOfFame onBack={() => setPage('home')} />}
        {page === 'compare' && <ComparePage />}
        {page === 'calc' && <ConfusionCalc />}
      </main>
      {shareVid && <ShareCard vid={shareVid} onClose={() => setShareVid(null)} />}
      <TweaksPanel>
        <TweakSection title="外观">
          <TweakColor id="accentColor" label="主色调" value={tweaks.accentColor} onChange={(v) => setTweak('accentColor', v)} />
          <TweakToggle id="showDanmaku" label="浮动问号背景" value={tweaks.showDanmaku} onChange={(v) => setTweak('showDanmaku', v)} />
        </TweakSection>
        <TweakSection title="Hero 视频">
          <TweakRadio id="heroIdx" label="选择视频" value={tweaks.heroIdx}
            options={vids.map((v, i) => ({ value: String(i), label: `视频 ${i + 1}` }))}
            onChange={(v) => setTweak('heroIdx', v)} />
        </TweakSection>
      </TweaksPanel>
    </div>);

  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
})();
</script>
</body>
</html>
